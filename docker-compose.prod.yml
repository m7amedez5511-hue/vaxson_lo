services:
  logistic-app:
    container_name: logistics-app
    build:
      context: .
      target: production
    expose:
      - "3000"
    volumes:
      - ./public/uploads:/app/public/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://logistic_app:${POSTGRES_PASSWORD}@postgres:5432/logistic_app
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - PG_POOL_MAX=${PG_POOL_MAX:-10}
      - SKIP_PRISMA_GENERATE=${SKIP_PRISMA_GENERATE:-true}
      - RUN_DB_SEED=${RUN_DB_SEED:-false}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_healthy

  logistic-worker:
    container_name: logistics-worker
    build:
      context: .
      target: production
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://logistic_app:${POSTGRES_PASSWORD}@postgres:5432/logistic_app
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
      - PG_POOL_MAX=${PG_POOL_MAX:-8}
      - DB_CONCURRENCY=${DB_CONCURRENCY:-5}
      - CRON_STARTUP_DELAY_MS=${CRON_STARTUP_DELAY_MS:-45000}
      - SMS_WORKER_CONCURRENCY=${SMS_WORKER_CONCURRENCY:-3}
      - SKIP_PRISMA_GENERATE=true
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      logistic-app:
        condition: service_started
    command: node src/worker.js

  nginx:
    container_name: logistics-nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_SERVER_NAME: ${API_SERVER_NAME:-logiapi.slash.sa}
      API_UPSTREAM_HOST: ${API_UPSTREAM_HOST:-logistic-app}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      logistic-app:
        condition: service_started
    restart: always

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  mongo:
    ports: !reset []

  pgweb:
    profiles:
      - dev-tools

  mongo-express:
    profiles:
      - dev-tools
