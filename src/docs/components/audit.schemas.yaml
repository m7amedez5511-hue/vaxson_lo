ActivityLog:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Unique identifier for the activity log
      example: "4f389de8-66e0-4b5a-87f6-7ae17fefd4f0"
      default: "4f389de8-66e0-4b5a-87f6-7ae17fefd4f0"
    userId:
      type: string
      format: uuid
      description: The ID of the user who performed the action
      example: "72cc2eeb-ef50-4820-973c-0c8d67e1e0cf"
      default: "72cc2eeb-ef50-4820-973c-0c8d67e1e0cf"
    action:
      type: string
      description: The action performed (e.g., CREATE_BRANCH)
      example: "CREATE_BRANCH"
      default: "CREATE_BRANCH"
    module:
      type: string
      description: The module where the action occurred
      example: "Branch"
      default: "Branch"
    recordId:
      type: string
      description: The ID of the affected record
      example: "b25c243d-c9c4-489d-8f65-61d1726a731f"
      default: "b25c243d-c9c4-489d-8f65-61d1726a731f"
    description:
      type: string
      description: Human-readable description of the activity
      example: "إنشاء فرع جديد: Riyadh Main Branch"
      default: "إنشاء فرع جديد: Riyadh Main Branch"
    status:
      type: string
      enum: [SUCCESS, FAILED]
      example: "SUCCESS"
      default: "SUCCESS"
    errorMessage:
      type: string
      nullable: true
      example: null
    oldData:
      type: object
      nullable: true
      example: null
    newData:
      type: object
      nullable: true
      example: {"name": "Riyadh Main Branch", "city": "Riyadh"}
    requestMeta:
      type: object
      properties:
        ip:
          type: string
          example: "::ffff:172.18.0.1"
        url:
          type: string
          example: "/api/v1/branches"
        method:
          type: string
          example: "POST"
        device:
          type: object
          properties:
            os:
              type: string
              example: "Windows 10"
            browser:
              type: string
              example: "Chrome 147.0.0.0"
    createdAt:
      type: string
      format: date-time
      example: "2026-04-28T12:09:44.656Z"
      default: "2026-04-28T12:09:44.656Z"
    user:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: object
          nullable: true
        branch:
          type: object
          nullable: true

ActivityLogListResponse:
  type: object
  properties:
    message:
      type: string
      example: "Activities fetched successfully"
    success:
      type: boolean
      example: true
    responseAt:
      type: string
      format: date-time
    data:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/ActivityLog"
        meta:
          $ref: "./Utils.schemas.yaml#/PaginationMeta"

ActivityLogDetailResponse:
  type: object
  properties:
    message:
      type: string
      example: "Activity details fetched successfully"
    success:
      type: boolean
      example: true
    responseAt:
      type: string
      format: date-time
    data:
      $ref: "#/ActivityLog"
