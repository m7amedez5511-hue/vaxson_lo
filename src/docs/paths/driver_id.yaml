get:
  summary: Get driver by ID
  description: Retrieve a specific driver by their ID
  tags:
    - Driver
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Driver ID (UUID)
      example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
  responses:
    "200":
      description: Driver fetched successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/driver.schemas.yaml#/DriverIdentity"
    "404":
      description: Driver not found
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

patch:
  summary: Update driver
  description: Update driver information (requires authentication)
  tags:
    - Driver
  security:
    - bearerAuth: []
  
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Driver ID (UUID)
      example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: "../components/driver.schemas.yaml#/UpdateDriverRequest"
  responses:
    "200":
      description: driver updated successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/driver.schemas.yaml#/DriverIdentity"
    "401":
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
    "404":
      description: Driver not found
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

delete:
  summary: Soft delete Driver
  description: Mark a Driver as deleted (soft delete)
  tags:
    - Driver
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      description: Driver ID (UUID)
      example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
  responses:
    "200":
      description: Driver deleted successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/driver.schemas.yaml#/DriverIdentity"
    "404":
      description: Driver not found
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
