post:
  summary: Create a new user
  description: Adds a new user to the system with basic identity information. 
  tags:
    - User
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/user.schemas.yaml#/CreateUserRequest"
  responses:
    "201":
      description: User created successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/user.schemas.yaml#/UserIdentity"
    "400":
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
    "409":
      description: Conflict - Email or Phone already exists
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

get:
  summary: Get all users
  description: Retrieve a paginated list of User with search and filtering options.
  tags:
    - User
  security:
    - bearerAuth: []
  parameters:
    - in: query
      name: page
      schema:
        type: integer
        default: 1
      example: 1
      description: Page number to retrieve
    - in: query
      name: limit
      schema:
        type: integer
        default: 10
      example: 10
      description: Number of items per page
    - in: query
      name: search
      schema:
        type: string
      example: "Slash"
      description: Search term for name, email, or phone
    - in: query
      name: sort
      schema:
        type: string
        default: "-createdAt"
      example: "-createdAt,name"
      description: |
        Sort results by fields.
        - **Ascending:** `field` (e.g., `name`).
        - **Descending:** `-field` (e.g., `-createdAt`).
        - **Multi-sort:** `field1,field2`
    - in: query
      name: isActive
      schema:
        type: boolean
      example: true
      description: Filter by activity status
  responses:
    "200":
      description: users fetched successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../components/user.schemas.yaml#/UserIdentity"
                      meta:
                        $ref: "../components/Utils.schemas.yaml#/PaginationMeta"



info:
  get:
    summary: Get current user info
    description: Retrieve the currently authenticated user's information
    tags:
      - User
    security:
      - bearerAuth: []
    
    responses:
      "200":
        description: User info retrieved successfully
        content:
          application/json:
            schema:
              allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../components/user.schemas.yaml#/UserIdentity"
                      meta:
                        $ref: "../components/Utils.schemas.yaml#/PaginationMeta"
      "401":
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

archived:
  get:
    summary: Get archived users
    description: Retrieve a paginated list of soft-deleted users.
    tags:
      - User
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        example: 1
        description: Page number to retrieve
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
        example: 10
        description: Number of items per page
      - in: query
        name: search
        schema:
          type: string
        example: "Slash"
        description: Search term for name, email, or phone
      - in: query
        name: sort
        schema:
          type: string
          default: "-createdAt"
        example: "-createdAt,name"
        description: |
          Sort results by fields.
          - **Ascending:** `field` (e.g., `name`).
          - **Descending:** `-field` (e.g., `-createdAt`).
          - **Multi-sort:** `field1,field2`
    responses:
      "200":
        description: archived users fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        data:
                          type: array
                          items:
                            $ref: "../components/user.schemas.yaml#/UserIdentity"
                        meta:
                          $ref: "../components/Utils.schemas.yaml#/PaginationMeta"

archivedById:
  get:
    summary: Get archived user by ID
    description: Retrieve a soft-deleted user by their ID.
    tags:
      - User
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "200":
        description: Archived user fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      $ref: "../components/user.schemas.yaml#/UserIdentity"
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

userById:
  get:
    summary: Get user by ID
    description: Retrieve a specific user by their ID
    tags:
      - User
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "200":
        description: User fetched successfully
        content:
          application/json:
            schema:
              allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../components/user.schemas.yaml#/UserIdentity"
                      meta:
                        $ref: "../components/Utils.schemas.yaml#/PaginationMeta"
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
  
  put:
    summary: Update user
    description: Update user information (requires authentication)
    tags:
      - User
    security:
      - bearerAuth: []
    
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/user.schemas.yaml#/UpdateUserRequest"
    responses:
      "200":
        description: User updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "users.update_successfuly"
                success:
                  type: boolean
                  example: true
                responseAt:
                  type: string
                  format: date-time
                data:
                  type: object
                  properties:
                    user:
                      $ref: "../components/user.schemas.yaml#/UserIdentity"
      "401":
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
  
  delete:
    summary: Soft delete user
    description: Mark a user as deleted (soft delete)
    tags:
      - User
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "200":
        description: User deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "users.deletw_successfuly"
                success:
                  type: boolean
                  example: true
                responseAt:
                  type: string
                  format: date-time
                data:
                  type: object
                  properties:
                    user:
                      $ref: "../components/user.schemas.yaml#/UserIdentity"
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"