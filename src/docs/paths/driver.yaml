post:
  summary: Create a new Driver
  description: Adds a new driver to the system with basic identity information. 
  tags:
    - Driver
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: "../components/driver.schemas.yaml#/CreateDriverRequest"
  responses:
    "201":
      description: Driver created successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/driver.schemas.yaml#/DriverIdentity"
    "400":
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"
    "409":
      description: Conflict - Email or Phone or nationalId na already exists
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

get:
  summary: Get all drivers
  description: Retrieve a paginated list of drivers with search and filtering options.
  tags:
    - Driver
  security:
    - bearerAuth: []
  parameters:
    - in: query
      name: page
      schema:
        type: integer
        default: 1
      example: 1
      description: Page number to retrieve
    - in: query
      name: limit
      schema:
        type: integer
        default: 10
      example: 10
      description: Number of items per page
    - in: query
      name: search
      schema:
        type: string
      example: "Slash"
      description: Search term for name, email, or phone or userName,adress,nationaltyid,goseNumber
    - in: query
      name: sort
      schema:
        type: string
        default: "-createdAt"
      example: "-createdAt,name"
      description: |
        Sort results by fields.
        - **Ascending:** `field` (e.g., `name`).
        - **Descending:** `-field` (e.g., `-createdAt`).
        - **Multi-sort:** `field1,field2`
    - in: query
      name: isActive
      schema:
        type: boolean
      example: true
      description: Filter by activity status
  responses:
    "200":
      description: drivers fetched successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../components/driver.schemas.yaml#/DriverIdentity"
                      meta:
                        $ref: "../components/Utils.schemas.yaml#/PaginationMeta"

me:
  get:
    summary: Get current driver info
    description: Retrieve the currently authenticated driver's profile.
    tags:
      - Driver
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Driver info retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      $ref: "../components/driver.schemas.yaml#/DriverIdentity"
      "401":
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

archived:
  get:
    summary: Get archived drivers
    description: Retrieve a paginated list of soft-deleted drivers.
    tags:
      - Driver
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        example: 1
        description: Page number to retrieve
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
        example: 10
        description: Number of items per page
      - in: query
        name: search
        schema:
          type: string
        example: "Slash"
        description: Search term for name, email, phone, or userName, address, nationality, or gosiNumber
      - in: query
        name: sort
        schema:
          type: string
          default: "-createdAt"
        example: "-createdAt,name"
        description: |
          Sort results by fields.
          - **Ascending:** `field` (e.g., `name`).
          - **Descending:** `-field` (e.g., `-createdAt`).
          - **Multi-sort:** `field1,field2`
      - in: query
        name: isActive
        schema:
          type: boolean
        example: true
        description: Filter by activity status
    responses:
      "200":
        description: archived drivers fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        data:
                          type: array
                          items:
                            $ref: "../components/driver.schemas.yaml#/DriverIdentity"
                        meta:
                          $ref: "../components/Utils.schemas.yaml#/PaginationMeta"

archivedById:
  get:
    summary: Get archived driver by ID
    description: Retrieve a soft-deleted driver by their ID.
    tags:
      - Driver
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Driver ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "200":
        description: Archived driver fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      $ref: "../components/driver.schemas.yaml#/DriverIdentity"
      "404":
        description: Driver not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

archivedDriverStatusById:
  get:
    summary: Get archived driver status history by driver ID
    description: Retrieve archived driver status history records for a specific driver.
    tags:
      - Driver
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Driver ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "200":
        description: Archived driver status history fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        data:
                          type: array
                          items:
                            $ref: "../components/driver.schemas.yaml#/DriverStatusHistory"
                        meta:
                          $ref: "../components/Utils.schemas.yaml#/PaginationMeta"
      "404":
        description: Driver not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

deleteDriverStatusHistory:
  delete:
    summary: Soft delete a driver status history record
    description: Soft delete a specific driver status history entry.
    tags:
      - Driver
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Driver status history ID (UUID)
        example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
    responses:
      "204":
        description: Driver status history deleted successfully
      "404":
        description: Driver status history not found
        content:
          application/json:
            schema:
              $ref: "../components/Utils.schemas.yaml#/ErrorResponse"