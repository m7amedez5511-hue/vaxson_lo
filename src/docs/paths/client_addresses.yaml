get:
  summary: Get all addresses for a client
  description: Retrieve a list of all active addresses associated with a specific client.
  tags:
    - Client Address
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: clientId
      required: true
      schema:
        type: string
      description: UUID of the client
      example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
  responses:
    "200":
      description: Addresses fetched successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/address.schemas.yaml#/ClientAddress"
    "404":
      description: Client not found
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

post:
  summary: Create a new address for a client
  description: Add a new physical address to a client's profile.
  tags:
    - Client Address
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: clientId
      required: true
      schema:
        type: string
      description: UUID of the client
      example: "f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/address.schemas.yaml#/AddressCreateRequest"
  responses:
    "201":
      description: Address created successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/address.schemas.yaml#/ClientAddress"
    "400":
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "../components/Utils.schemas.yaml#/ErrorResponse"

archived:
  get:
    summary: Get archived addresses for a client
    description: Retrieve soft-deleted addresses for a specific client.
    tags:
      - Client Address
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: clientId
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Archived addresses fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "../components/address.schemas.yaml#/ClientAddress"

globalArchived:
  get:
    summary: Get ALL archived addresses
    description: Retrieve a global list of all soft-deleted addresses in the system.
    tags:
      - Client Address
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Global archived addresses fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/Utils.schemas.yaml#/SuccessResponse"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "../components/address.schemas.yaml#/ClientAddress"
