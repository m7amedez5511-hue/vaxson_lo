openapi: 3.0.0
info:
  title: Logistics API
  version: 1.0.0
  description: API for managing logistics operations, clients, and addresses.
servers:
  - url: http://localhost:3000/api
    description: Development server
paths:
  /v1/auth/login:
    post:
      summary: Login User
      description: Sign in user using endpoint to login and get token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Wrong password or username not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/dashboard/summary:
    get:
      tags:
        - Dashboard
      summary: Get dashboard summary
      description: Returns a consolidated view of counts, alerts, active trips, and account security.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: dashboard summary fetched successfully
                  data:
                    $ref: '#/components/schemas/DashboardSummary'
        '401':
          description: Unauthorized
  /v1/users:
    post:
      summary: Create a new user
      description: Adds a new user to the system with basic identity information.
      tags:
        - User
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserIdentity'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Email or Phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get all users
      description: Retrieve a paginated list of User with search and filtering options.
      tags:
        - User
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          example: 1
          description: Page number to retrieve
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          example: 10
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          example: Slash
          description: Search term for name, email, or phone
        - in: query
          name: sort
          schema:
            type: string
            default: '-createdAt'
          example: '-createdAt,name'
          description: |
            Sort results by fields.
            - **Ascending:** `field` (e.g., `name`).
            - **Descending:** `-field` (e.g., `-createdAt`).
            - **Multi-sort:** `field1,field2`
        - in: query
          name: isActive
          schema:
            type: boolean
          example: true
          description: Filter by activity status
      responses:
        '200':
          description: users fetched successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserIdentity'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'
    info:
      get:
        summary: Get current user info
        description: Retrieve the currently authenticated user's information
        tags:
          - User
        security:
          - bearerAuth: []
        responses:
          '200':
            description: User info retrieved successfully
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/SuccessResponse'
                    - type: object
                      properties:
                        data:
                          type: object
                          properties:
                            data:
                              type: array
                              items:
                                $ref: '#/components/schemas/UserIdentity'
                            meta:
                              $ref: '#/components/schemas/PaginationMeta'
          '401':
            description: Unauthorized - Authentication required
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    archived:
      get:
        summary: Get archived users
        description: Retrieve a paginated list of soft-deleted users.
        tags:
          - User
        security:
          - bearerAuth: []
        parameters:
          - in: query
            name: page
            schema:
              type: integer
              default: 1
            example: 1
            description: Page number to retrieve
          - in: query
            name: limit
            schema:
              type: integer
              default: 10
            example: 10
            description: Number of items per page
          - in: query
            name: search
            schema:
              type: string
            example: Slash
            description: Search term for name, email, or phone
          - in: query
            name: sort
            schema:
              type: string
              default: '-createdAt'
            example: '-createdAt,name'
            description: |
              Sort results by fields.
              - **Ascending:** `field` (e.g., `name`).
              - **Descending:** `-field` (e.g., `-createdAt`).
              - **Multi-sort:** `field1,field2`
        responses:
          '200':
            description: archived users fetched successfully
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/SuccessResponse'
                    - type: object
                      properties:
                        data:
                          type: object
                          properties:
                            data:
                              type: array
                              items:
                                $ref: '#/components/schemas/UserIdentity'
                            meta:
                              $ref: '#/components/schemas/PaginationMeta'
    archivedById:
      get:
        summary: Get archived user by ID
        description: Retrieve a soft-deleted user by their ID.
        tags:
          - User
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
            description: User ID (UUID)
            example: f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e
        responses:
          '200':
            description: Archived user fetched successfully
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/SuccessResponse'
                    - type: object
                      properties:
                        data:
                          $ref: '#/components/schemas/UserIdentity'
          '404':
            description: User not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    userById:
      get:
        summary: Get user by ID
        description: Retrieve a specific user by their ID
        tags:
          - User
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
            description: User ID (UUID)
            example: f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e
        responses:
          '200':
            description: User fetched successfully
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/SuccessResponse'
                    - type: object
                      properties:
                        data:
                          type: object
                          properties:
                            data:
                              type: array
                              items:
                                $ref: '#/components/schemas/UserIdentity'
                            meta:
                              $ref: '#/components/schemas/PaginationMeta'
          '404':
            description: User not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      put:
        summary: Update user
        description: Update user information (requires authentication)
        tags:
          - User
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
            description: User ID (UUID)
            example: f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserRequest'
        responses:
          '200':
            description: User updated successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: users.update_successfuly
                    success:
                      type: boolean
                      example: true
                    responseAt:
                      type: string
                      format: date-time
                    data:
                      type: object
                      properties:
                        user:
                          $ref: '#/components/schemas/UserIdentity'
          '401':
            description: Unauthorized - Authentication required
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: User not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      delete:
        summary: Soft delete user
        description: Mark a user as deleted (soft delete)
        tags:
          - User
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
            description: User ID (UUID)
            example: f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e
        responses:
          '200':
            description: User deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: users.deletw_successfuly
                    success:
                      type: boolean
                      example: true
                    responseAt:
                      type: string
                      format: date-time
                    data:
                      type: object
                      properties:
                        user:
                          $ref: '#/components/schemas/UserIdentity'
          '404':
            description: User not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
