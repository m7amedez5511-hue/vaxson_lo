          type: string
          example: updated.riyadh@slash.com
        phone:
          type: string
          example: '0555555555'
        city:
          type: string
          example: Jeddah
        street:
          type: string
          example: Tahlia St
        isActive:
          type: boolean
          default: true
          example: true
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
          description: Total number of records found
        page:
          type: integer
          example: 1
          description: Current page number
        limit:
          type: integer
          example: 10
          description: Number of records per page
        totalPages:
          type: integer
          example: 10
          description: Total number of pages available
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An error occurred
        responseAt:
          type: string
          format: date-time
          example: '2026-04-21T12:00:00.000Z'
        error:
          type: object
          properties:
            code:
              type: string
              example: validation_failed
            path:
              type: string
              example: /api/v1/resource
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  code:
                    type: string
    ClientIdentity:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the client (UUID)
          example: f5ec9e5e-990e-4c10-8bba-0eb9a0511c7e
        name:
          type: string
          description: The legal name or identifier of the client
          example: Mega Logistics Global
        email:
          type: string
          description: Primary contact email address
          example: contact@megalogistics.sa
        phone:
          type: string
          description: Contact phone number
          example: '0566778899'
        isActive:
          type: boolean
          description: Status indicating if the client is currently active
          example: true
        isDeleted:
          type: boolean
          description: Soft-delete flag
          example: false
        clientType:
          type: string
          enum:
            - Individual
            - Corporate
          description: Category of the client
          example: Corporate
        createdAt:
          type: string
          format: date-time
          description: ISO timestamp of record creation
          example: '2026-04-16T12:00:00.000Z'
        updatedAt:
          type: string
          format: date-time
          description: ISO timestamp of the last update
          example: '2026-04-16T12:30:00.000Z'
    ClientDetail:
      allOf:
