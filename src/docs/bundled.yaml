  /v1/reports/driver/{id}/daily:
    get:
      summary: Generate driver daily report (PDF)
      description: |
        Generates a PDF report for a specific driver on a given date.
        The report includes trip details (trip number, plate, total orders, delivered, not delivered, status)
        and overall stats (total trips, total orders, delivered, returned).
        Returns a URL to download the generated PDF file.
      tags:
        - Driver Reports
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Driver ID (UUID)
          example: 05b0565b-893e-47a5-b0d6-512851800825
        - in: query
          name: date
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            example: '2026-05-07'
          description: |
            Date to generate the report for (YYYY-MM-DD).
            Defaults to today's date if not provided.
      responses:
        '200':
          description: Driver report generated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DriverReportResponse'
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Driver not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AuthIdentity:
      type: object
      properties:
        userName:
          type: string
          description: The unique personal name for user
          example: user_12345
          default: user_12345
        email:
          type: string
          description: Primary contact email address
          example: contact@megalogistics.sa
          default: contact@megalogistics.sa
        phone:
          type: string
          description: Contact phone number
          example: '0566778899'
          default: '0566778899'
        password:
          type: string
          description: password of user
          example: '12345678'
          default: '12345678'
    LoginRequest:
      type: object
      required:
        - userName
        - phone
        - password
      properties:
        userName:
          type: string
          example: user_12345
          default: mohamed_slash
        email:
          type: string
          example: contact@megalogistics.sa
          default: contact@megalogistics.sa
        phone:
          type: string
          example: '0566778899'
          default: '+966512345678'
        password:
          type: string
          minLength: 8
          example: password123
          default: password123
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthIdentity'
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    DashboardSummary:
      type: object
      properties:
        stats:
          type: object
          properties:
            clients:
              type: integer
            orders:
              type: integer
            trips:
              type: integer
            cars:
              type: integer
            drivers:
              type: integer
        alerts:
          type: object
          properties:
            expiringCars:
              type: array
              items:
                type: object
            expiringDrivers:
              type: array
              items:
                type: object
            upcomingMaint:
              type: array
              items:
                type: object
        activeTrips:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              tripNumber:
                type: string
              title:
                type: string
              progress:
                type: integer
        accountSecurity:
          type: object
          properties:
            lastLogin:
              type: string
              format: date-time
            requestMeta:
              type: object
    BranchDetail:
      type: object
      properties:
        id:
          type: string
          example: 831d6976-9e99-4a45-9a49-76ad2675af49
        name:
          type: string
          default: Riyadh Main Branch
          example: Riyadh Main Branch
        email:
          type: string
          default: riyadh.branch@slash.com
          example: riyadh.branch@slash.com
        phone:
          type: string
          default: '0500000001'
          example: '0500000001'
        country:
          type: string
          default: SA
          example: SA
        city:
          type: string
          default: Riyadh
          example: Riyadh
        state:
          type: string
          nullable: true
          default: Riyadh Region
          example: Riyadh Region
        district:
          type: string
          default: Al-Olaya
          example: Al-Olaya
        street:
          type: string
          default: King Fahd St
          example: King Fahd St
        buildingNo:
          type: string
          nullable: true
          default: '123'
          example: '123'
        unitNo:
          type: string
          nullable: true
          default: '10'
          example: '10'
        zipCode:
          type: string
          nullable: true
          default: '12345'
          example: '12345'
        latitude:
          type: number
          default: 24.7136
          example: 24.7136
        longitude:
          type: number
          default: 46.6753
          example: 46.6753
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateBranchRequest:
      type: object
