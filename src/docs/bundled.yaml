  /v1/audit:
    get:
      summary: Get Activity Logs
      description: Retrieve a paginated and filtered list of all system activities/audit logs.
      tags:
        - Audit
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: name
          in: query
          description: Search by user name or userName
          schema:
            type: string
        - name: module
          in: query
          description: Filter by module (e.g. Branch, User, Order)
          schema:
            type: string
        - name: action
          in: query
          description: Filter by action (e.g. CREATE_BRANCH, UPDATE_USER)
          schema:
            type: string
        - name: fromDate
          in: query
          description: Filter from date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          description: Filter to date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Activities fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogListResponse'
        '401':
