          type: string
          default: Riyadh Main Branch
          example: Riyadh Main Branch
        email:
          type: string
          default: riyadh.branch@slash.com
          example: riyadh.branch@slash.com
        phone:
          type: string
          default: '0500000001'
          example: '0500000001'
        country:
          type: string
          default: SA
          example: SA
        city:
          type: string
          default: Riyadh
          example: Riyadh
        state:
          type: string
          default: Riyadh Region
          example: Riyadh Region
        district:
          type: string
          default: Al-Olaya
          example: Al-Olaya
        street:
          type: string
          default: King Fahd St
          example: King Fahd St
        buildingNo:
          type: string
          default: '123'
