services:
  logistic-app:
    container_name: logistics-app
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://logistic_app:${POSTGRES_PASSWORD}@postgres:5432/logistic_app
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - NODE_ENV=${NODE_ENV}
      - PG_POOL_MAX=${PG_POOL_MAX:-10}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SKIP_PRISMA_GENERATE=${SKIP_PRISMA_GENERATE:-false}
      - RUN_DB_SEED=${RUN_DB_SEED:-false}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_healthy

  logistic-worker:
    container_name: logistics-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://logistic_app:${POSTGRES_PASSWORD}@postgres:5432/logistic_app
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV}
      - PG_POOL_MAX=${PG_POOL_MAX:-8}
      - DB_CONCURRENCY=${DB_CONCURRENCY:-5}
      - CRON_STARTUP_DELAY_MS=${CRON_STARTUP_DELAY_MS:-45000}
      - SMS_WORKER_CONCURRENCY=${SMS_WORKER_CONCURRENCY:-3}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      logistic-app:
        condition: service_started
    command: sh -c "node src/worker.js"

  nginx:
    container_name: logistics-nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    environment:
      API_SERVER_NAME: ${API_SERVER_NAME:-localhost}
      API_UPSTREAM_HOST: ${API_UPSTREAM_HOST:-logistic-app}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      logistic-app:
        condition: service_started
    restart: always

  postgres:
    image: postgres:18
    container_name: logistics-db
    restart: always
    environment:
      POSTGRES_USER: logistic_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: logistic_app
    expose:
      - "5432"
    volumes:
      - logistics_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistic_app -d logistic_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8
    container_name: logistics-redis
    restart: always
    expose:
      - "6379"

  mongo:
    image: mongo:7
    container_name: logistics-mongo
    restart: always
    expose:
      - "27017"
    volumes:
      - logistics_mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.runCommand({ping: 1})'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express
    restart: always
    profiles:
      - dev-tools
    expose:
      - "8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    depends_on:
      - mongo

  pgweb:
    image: sosedoff/pgweb
    container_name: pgweb
    restart: always
    profiles:
      - dev-tools
    expose:
      - "8081"
    environment:
      - DATABASE_URL=${PGWEB_DATABASE_URL}
      - PGWEB_AUTH_USER=${PGWEB_AUTH_USER}
      - PGWEB_AUTH_PASS=${PGWEB_AUTH_PASS}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  logistics_postgres_data:
  logistics_mongo_data:
